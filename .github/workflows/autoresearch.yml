# Autoresearch: Autonomous system prompt optimization
#
# Runs the autoresearch loop on a schedule (or manually).
# Each run does up to 30 rounds of eval → improve → keep/revert,
# then pushes results back to a PR branch.
#
# Required secrets:
#   OPENAI_API_KEY - for the agent and eval scoring
#
# Optional secrets:
#   PUSHOVER_USER  - push notifications
#   PUSHOVER_TOKEN - push notifications

name: Autoresearch

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      max_rounds:
        description: "Max improvement rounds"
        required: false
        default: "30"
        type: string

  # Or run on a schedule (e.g., every night at 2am UTC)
  # Uncomment the lines below when you're ready:
  # schedule:
  #   - cron: "0 2 * * *"

jobs:
  autoresearch:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Safety net — a 30-round run usually takes ~30 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history for git operations (revert, branch)
          fetch-depth: 0
          # Use a PAT or the default GITHUB_TOKEN for pushing
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Configure git identity
        run: |
          git config user.name "autoresearch-bot"
          git config user.email "autoresearch@github-actions.bot"

      - name: Create autoresearch branch
        run: |
          BRANCH="autoresearch/prompt-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run autoresearch loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: |
          python autoresearch.py --max-rounds ${{ inputs.max_rounds || '30' }}

      - name: Push results branch
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read results.log for PR body
          RESULTS=$(cat results.log 2>/dev/null || echo "No results log found")

          gh pr create \
            --title "Autoresearch: system prompt optimization $(date +%Y-%m-%d)" \
            --body "$(cat <<'PREOF'
          ## Autoresearch Results

          Autonomous optimization of \`system_prompt.md\` using the eval harness.

          ### Results Log
          \`\`\`
          $RESULTS
          \`\`\`

          ### What changed
          - Only \`system_prompt.md\` was modified (the one file the loop is allowed to touch)
          - Each round: eval → LLM suggests one change → re-eval → keep if improved, revert if not
          - \`eval.py\` and \`eval-criteria.md\` were never modified

          ### How to review
          1. Look at the diff on \`system_prompt.md\` — that's the only meaningful change
          2. Check \`results.log\` for the full round-by-round history
          3. Optionally re-run the eval locally: \`python eval.py --verbose\`

          ---
          *Generated by [autoresearch](https://github.com/karpathy/autoresearch)*
          PREOF
          )" \
            --base main \
            --head "$BRANCH"
